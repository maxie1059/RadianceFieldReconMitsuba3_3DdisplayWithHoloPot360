<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hologram</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: black; overflow: hidden;
    }
    #glCanvas {
      display: block; position: absolute;
      left: 50%; transform: translateX(-50%);
    }
    #startOverlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 10; user-select: none;
    }
    #startOverlay span {
      color: white; font-family: sans-serif;
      font-size: 1.4rem; letter-spacing: 0.15em;
      opacity: 0.85; pointer-events: none;
    }
    #startOverlay small {
      color: #888; font-family: sans-serif;
      font-size: 0.8rem; margin-top: 0.5rem;
      pointer-events: none;
    }
    #debug {
      position: absolute; bottom: 8px; left: 8px;
      color: #0f0; font-family: monospace; font-size: 1.1rem;
      z-index: 20; pointer-events: none; line-height: 1.8;
      background: rgba(0,0,0,0.45); padding: 4px 6px; border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="startOverlay">
  <span>WAITING FOR SERVER…</span>
  <small id="phoneLabel"></small>
</div>

<canvas id="glCanvas"></canvas>
<div id="debug">waiting…</div>

<script>
(function() {
  // ---------------------------------------------------------
  // 1) URL params
  // ---------------------------------------------------------
  const params    = new URLSearchParams(window.location.search);
  const mode      = params.get('mode')      || 'test';
  const freq      = parseFloat(params.get('frequency') || '120');
  const rps       = parseFloat(params.get('rps')       || '3.75');
  const numViews  = parseFloat(params.get('numViews')  || '32');
  const phoneNum  = parseInt(params.get('phone')       || '1', 10);

  const phoneOffset = (phoneNum === 2) ? Math.round(numViews / 2) : 0;
  const skipSprite  = Math.round(32 / numViews);

  let framesToSwitch;
  if (mode === 'test') {
    framesToSwitch = (freq / rps) * 0.5;
  } else if (mode === 'viking32' || mode === 'statue32' || mode === 'hologram32') {
    framesToSwitch = (freq / rps) * (1 / numViews);
  } else {
    framesToSwitch = (freq / rps) * 0.25;
  }
  framesToSwitch = Math.round(framesToSwitch);
  if (framesToSwitch < 1) framesToSwitch = 1;

  const msPerStep = (framesToSwitch / freq) * 1000;

  document.getElementById('phoneLabel').textContent =
    'Phone ' + phoneNum + (phoneNum === 2 ? '  (180° offset)' : '  (0° start)');

  // ---------------------------------------------------------
  // 2) WebSocket — connects back to the server that served this page
  // ---------------------------------------------------------
  const ws = new WebSocket('ws://' + location.host);
  let epoch = null;   // set by server START message
  let nudge = 0;      // frame nudge sent by server, applied to phone 2 only

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'start') {
      epoch = msg.epoch;
      nudge = msg.nudge || 0;
      // Hide overlay and begin loop
      document.getElementById('startOverlay').style.display = 'none';
      if (!loopStarted) {
        loopStarted = true;
        requestAnimationFrame(() => loop(currentColumns, currentRows));
      }
    }

    if (msg.type === 'nudge') {
      nudge = msg.nudge;
    }
  };

  ws.onclose = () => {
    document.getElementById('debug').innerHTML = 'WS disconnected';
  };

  // ---------------------------------------------------------
  // 3) Canvas / WebGL
  // ---------------------------------------------------------
  const canvas = document.getElementById('glCanvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) { alert('WebGL not supported'); return; }

  function resizeCanvas() {
    const h = window.innerHeight, w = h / 2;
    canvas.style.height = h + 'px'; canvas.style.width = w + 'px';
    canvas.width = w; canvas.height = h;
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  canvas.addEventListener('click', () => {
    if (!document.fullscreenElement) canvas.requestFullscreen();
    else document.exitFullscreen();
  });

  // ---------------------------------------------------------
  // 4) Shaders
  // ---------------------------------------------------------
  const vsSource = `
    attribute vec2 aPosition; attribute vec2 aTexCoord; attribute float aColorMode;
    varying vec2 vTexCoord; varying float vColorMode;
    void main(void) { vTexCoord=aTexCoord; vColorMode=aColorMode; gl_Position=vec4(aPosition,0,1); }
  `;
  const fsSource = `
    precision mediump float;
    varying vec2 vTexCoord; varying float vColorMode;
    uniform vec4 uSolidColor; uniform sampler2D uSampler;
    void main(void) {
      if (vColorMode > 0.5) gl_FragColor = uSolidColor;
      else gl_FragColor = texture2D(uSampler, vTexCoord);
    }
  `;

  function loadShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s)); gl.deleteShader(s); return null;
    }
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, loadShader(gl.VERTEX_SHADER, vsSource));
  gl.attachShader(prog, loadShader(gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const aPosition   = gl.getAttribLocation(prog, 'aPosition');
  const aTexCoord   = gl.getAttribLocation(prog, 'aTexCoord');
  const aColorMode  = gl.getAttribLocation(prog, 'aColorMode');
  const uSolidColor = gl.getUniformLocation(prog, 'uSolidColor');
  const uSampler    = gl.getUniformLocation(prog, 'uSampler');

  // ---------------------------------------------------------
  // 5) Buffer
  // ---------------------------------------------------------
  const buffer = gl.createBuffer();
  let positions = null;

  function setupQuad(aspect) {
    let hw, hh;
    if (aspect >= 1) { hw = 1.0; hh = 1/aspect; } else { hh = 1.0; hw = aspect; }
    positions = new Float32Array([-hw,-hh, hw,-hh, -hw,hh, hw,hh]);
    const tex = new Float32Array([0,0, 1,0, 0,1, 1,1]);
    const cm  = (mode === 'test') ? [1,1,1,1] : [0,0,0,0];
    const d = [];
    for (let i = 0; i < 8; i+=2) d.push(positions[i],positions[i+1],tex[i],tex[i+1],cm[i/2]);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(d), gl.STATIC_DRAW);
  }

  // ---------------------------------------------------------
  // 6) Texture
  // ---------------------------------------------------------
  let texture = null;
  const colorCyan = [0,1,1,1], colorRed = [1,0,0,1];
  const textureImages = {
    viking4: 'viking.png', viking32: 'viking32.png',
    statue32: 'statue32.png', hologram32: 'hologram32.png'
  };

  // ---------------------------------------------------------
  // 7) Render
  // ---------------------------------------------------------
  const debugEl = document.getElementById('debug');

  function renderFrame(columns, rows, spriteStep) {
    gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);

    if (mode === 'test') {
      gl.uniform4fv(uSolidColor, (spriteStep % 2 === 0) ? colorCyan : colorRed);
    } else {
      const totalFrames = columns * rows;

      // Reduce step within one full cycle first, then apply offset + direction
      const s = ((spriteStep % totalFrames) + totalFrames) % totalFrames;

      // Phone 2 nudge: server can push nudge +/- to correct alignment live
      const extraOffset = (phoneNum === 2) ? nudge : 0;

      let subImageIdx;
      if (mode === 'viking32' || mode === 'statue32' || mode === 'hologram32') {
        subImageIdx = ((phoneOffset + extraOffset - s) % totalFrames + totalFrames) % totalFrames;
      } else {
        subImageIdx = (phoneOffset + extraOffset + s * skipSprite) % totalFrames;
      }

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.uniform1i(uSampler, 0);

      debugEl.innerHTML =
        `step: ${spriteStep}<br>idx: ${subImageIdx}<br>nudge: ${nudge}`;

      const col         = subImageIdx % columns;
      const row         = Math.floor(subImageIdx / columns);
      const invertedRow = (rows - 1) - row;

      const uLeft   = col * (1/columns);
      const uRight  = uLeft + (1/columns);
      const vTop    = invertedRow * (1/rows);
      const vBottom = vTop + (1/rows);

      const data = [];
      for (let i = 0; i < 4; i++) {
        const px = positions[i*2], py = positions[i*2+1];
        const ou = (i%2===1) ? 1.0 : 0.0;
        const ov = (i>=2)    ? 1.0 : 0.0;
        data.push(px, py, ou>0.5?uRight:uLeft, ov>0.5?vBottom:vTop, 0);
      }
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.STATIC_DRAW);
    }

    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    const stride = 5*4;
    gl.enableVertexAttribArray(aPosition);  gl.vertexAttribPointer(aPosition, 2,gl.FLOAT,false,stride,0);
    gl.enableVertexAttribArray(aTexCoord);  gl.vertexAttribPointer(aTexCoord, 2,gl.FLOAT,false,stride,8);
    gl.enableVertexAttribArray(aColorMode); gl.vertexAttribPointer(aColorMode,1,gl.FLOAT,false,stride,16);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // ---------------------------------------------------------
  // 8) Loop — epoch set by server, spriteStep from wall clock
  // ---------------------------------------------------------
  let loopStarted   = false;
  let currentColumns = 1, currentRows = 1;

  function loop(columns, rows) {
    const spriteStep = Math.floor((Date.now() - epoch) / msPerStep);
    renderFrame(columns, rows, spriteStep);
    requestAnimationFrame(() => loop(columns, rows));
  }

  // ---------------------------------------------------------
  // 9) Init
  // ---------------------------------------------------------
  if (mode in textureImages) {
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    texture = gl.createTexture();
    const image = new Image();
    image.src = textureImages[mode];
    image.onload = function() {
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      if (mode === 'viking4') {
        currentColumns = 4; currentRows = 1;
      } else if (mode === 'viking32' || mode === 'statue32' || mode === 'hologram32') {
        currentColumns = 8; currentRows = 4;
      }
      setupQuad(1);
      // Render preview frame (step=0) behind overlay
      renderFrame(currentColumns, currentRows, 0);
    };
  } else {
    setupQuad(1.0);
    renderFrame(1, 1, 0);
  }

})();
</script>
</body>
</html>
